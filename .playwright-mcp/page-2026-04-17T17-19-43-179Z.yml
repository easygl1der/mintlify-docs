                    - heading "Setup Basics" [level=2] [ref=e145]
                    - paragraph [ref=e146]:
                      - text: Install Hermes via the quickstart on Linux, macOS, or WSL2, using an LLM provider like OpenRouter for access to models such as Hermes 3. Configure API keys and optional messaging gateways like Telegram during the interactive wizard.
                      - generic [ref=e151] [cursor=pointer]:
                        - generic [ref=e152]: datacamp
                        - generic [ref=e153]: "+1"
                    - heading "Memory Management" [level=2] [ref=e154]
                    - paragraph [ref=e155]:
                      - text: "Utilize the three-level memory: session for current chats, persistent for facts/preferences, and skill memory for reusable patterns stored as markdown files. Enable FTS5 search and LLM summarization to recall context from long histories without token limits."
                      - generic [ref=e160] [cursor=pointer]:
                        - generic [ref=e161]: hermes-agent.nousresearch
                        - generic [ref=e162]: "+1"
                    - heading "Security Practices" [level=2] [ref=e163]
                    - paragraph [ref=e164]:
                      - text: Deploy with Docker backend, read-only root, and dropped capabilities for production. Activate prompt injection scanning, review tool permissions, apply credential filtering, and monitor logs regularly.
