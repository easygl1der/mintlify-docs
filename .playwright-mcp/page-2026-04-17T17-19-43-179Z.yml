                  - generic [ref=e398]:
                    - paragraph [ref=e399]:
                      - text: Hermes Agent's self-improving learning loop is a closed feedback cycle that operates continuously during and across sessions, enabling the agent to autonomously curate memory, create skills, and refine its capabilities without human intervention.
                      - generic [ref=e404] [cursor=pointer]:
                        - generic [ref=e405]: mranand.substack
                        - generic [ref=e406]: "+1"
                    - heading "Core Components" [level=2] [ref=e407]
                    - paragraph [ref=e408]:
                      - text: "The loop comprises four interconnected parts: agent-curated memory with periodic nudges, autonomous skill creation, skill self-improvement, and FTS5 cross-session recall enhanced by LLM summarization. Periodic nudges prompt the agent at intervals to evaluate recent activity and persist useful facts to memory files, keeping storage curated rather than exhaustive."
                      - generic [ref=e413] [cursor=pointer]:
                        - generic [ref=e414]: hermes-agent.nousresearch
                        - generic [ref=e415]: "+1"
                    - heading "Skill Lifecycle" [level=2] [ref=e416]
                    - paragraph [ref=e417]:
                      - text: Upon task completion—triggered by conditions like 5+ tool calls, error recovery, or user corrections—the agent generates a reusable Markdown skill file detailing steps, tools, and context per the agentskills.io standard. During future uses, it refines skills incrementally via targeted edits (e.g., edit_skill tool), favoring precise replacements over full rewrites.
                      - generic [ref=e422] [cursor=pointer]:
                        - generic [ref=e423]: yuv
                        - generic [ref=e424]: "+1"
                    - heading "Memory Layers" [level=2] [ref=e425]
                    - paragraph [ref=e426]:
                      - text: Session memory logs interactions for immediate recall; persistent memory stores facts and episodic details; skills handle procedures. An optional Honcho layer models user preferences dialectically across sessions, while the Gateway ensures always-on access, feeding refined context into each new task via preflight compression.
                      - generic [ref=e431] [cursor=pointer]:
