                    - paragraph [ref=e271]:
                      - text: Hermes Agent is a self-improving AI agent from Nous Research that learns skills, manages memory across layers, and automates tasks via tools like file editing and cron jobs. Best practices emphasize specific prompting, memory utilization, security hardening, and delegation for efficiency.
                      - generic [ref=e276] [cursor=pointer]:
                        - generic [ref=e277]: hermes-agent.nousresearch
                        - generic [ref=e278]: "+2"
                    - heading "Prompting Tips" [level=2] [ref=e279]
                    - paragraph [ref=e280]:
                      - text: Be specific with context upfront, like including file paths and error messages, to minimize iterations. Use context files such as AGENTS.md for recurring instructions like coding styles, which the agent reads automatically each session. Let the agent leverage its tools freely instead of micromanaging steps.
                      - generic "Tips & Best Practices | Hermes Agent - nous research" [ref=e282]:
                        - link "hermes-agent.nousresearch" [ref=e284] [cursor=pointer]:
                          - /url: https://hermes-agent.nousresearch.com/docs/guides/tips
                          - generic [ref=e287]: hermes-agent.nousresearch
                    - heading "Memory and Skills" [level=2] [ref=e288]
                    - paragraph [ref=e289]:
                      - text: Explicitly tell the agent to "remember this" or save procedures as skills after complex tasks for reuse via /skill commands. Employ three memory layers—session, persistent facts, and procedural skills—with FTS5 search for quick recall from long histories.
                      - generic [ref=e294] [cursor=pointer]:
                        - generic [ref=e295]: lushbinary
                        - generic [ref=e296]: "+2"
                    - heading "Security Measures" [level=2] [ref=e297]
                    - paragraph [ref=e298]:
                      - text: Run in Docker with read-only root and dropped capabilities; enable prompt injection scanning and credential filtering. Use allowlists or DM pairing for messaging bots, review "always" approvals cautiously, and monitor logs regularly.
                      - generic [ref=e303] [cursor=pointer]:
                        - generic [ref=e304]: lushbinary
                        - generic [ref=e305]: "+1"
                    - heading "Task Execution" [level=2] [ref=e306]
                    - paragraph [ref=e307]:
                      - text: Delegate parallel subtasks to subagents for efficiency, use execute_code for batch operations, and switch models (/model) based on task complexity. Schedule automations naturally, like "check news daily at 9am," and set a home channel for proactive updates.
